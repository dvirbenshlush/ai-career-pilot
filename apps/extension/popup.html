<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Career Pilot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <div class="logo">🚀 AI Career Pilot</div>
      <button id="btn-logout" class="btn-icon" title="התנתק" style="display:none">✕</button>
    </header>

    <!-- Screen: not connected -->
    <div id="screen-auth" class="screen">
      <p class="hint">התחבר לחשבון שלך כדי לשלוח קו"ח ולהכין לראיון ישירות מכאן</p>
      <button id="btn-connect" class="btn btn-primary">🔗 התחבר לאתר</button>
    </div>

    <!-- Screen: main -->
    <div id="screen-main" class="screen" style="display:none">

      <div class="section">
        <label>תיאור המשרה</label>
        <textarea id="job-text" rows="5" placeholder="הדבק את תיאור המשרה כאן..."></textarea>
        <button id="btn-read-page" class="btn btn-secondary btn-sm">📄 קרא מהדף הנוכחי</button>
      </div>

      <div class="section">
        <label>מייל ליצירת קשר</label>
        <input id="contact-email" type="email" placeholder="hr@company.com" />
      </div>

      <div id="status" class="status" style="display:none"></div>

      <div class="actions">
        <button id="btn-send-cv" class="btn btn-primary" disabled>📤 שלח קו"ח</button>
        <button id="btn-interview" class="btn btn-secondary">🎓 הכן לראיון</button>
      </div>
      <div class="actions">
        <button id="btn-save-applied" class="btn btn-save" disabled>📌 שמור כהגשה</button>
      </div>

    </div>

    <!-- Screen: send wizard -->
    <div id="screen-wizard" class="screen" style="display:none">
      <button id="btn-back-wizard" class="btn btn-secondary btn-sm">← חזור</button>

      <div class="section">
        <label>מגדר לניסוח המכתב</label>
        <div class="toggle-row">
          <button class="btn btn-toggle" data-group="gender" data-val="male">👨 זכר</button>
          <button class="btn btn-toggle" data-group="gender" data-val="female">👩 נקבה</button>
        </div>
      </div>

      <div class="section">
        <label>שפת קורות החיים</label>
        <div class="toggle-row">
          <button class="btn btn-toggle selected" data-group="lang" data-val="he">עברית</button>
          <button class="btn btn-toggle" data-group="lang" data-val="en">English</button>
        </div>
      </div>

      <div class="section">
        <label>קורות חיים לשליחה</label>
        <div class="toggle-row">
          <button class="btn btn-toggle selected" data-group="cvtype" data-val="original">מקורי</button>
          <button class="btn btn-toggle" data-group="cvtype" data-val="tailored">✨ מותאם AI</button>
        </div>
      </div>

      <div id="wiz-status" class="status" style="display:none"></div>

      <div id="wiz-preview" style="display:none">
        <div class="preview-actions">
          <button id="btn-wiz-download" class="btn btn-secondary btn-sm">⬇️ הורד PDF</button>
          <button id="btn-wiz-open-doc" class="btn btn-secondary btn-sm" style="display:none">📄 Google Docs</button>
        </div>
        <pre id="wiz-tailor-text" class="resume-preview"></pre>
      </div>

      <button id="btn-wiz-action" class="btn btn-primary" disabled>המשך ›</button>
    </div>

    <!-- Screen: paste resume (shown when no resume in DB) -->
    <div id="screen-paste-resume" class="screen" style="display:none">
      <button id="btn-back-paste" class="btn btn-secondary btn-sm">← חזור</button>
      <p class="hint" style="text-align:right">לא נמצא קו"ח שמור. הדבק את הטקסט של הקו"ח שלך:</p>
      <div class="section">
        <textarea id="resume-text-input" rows="8" placeholder="הדבק כאן את תוכן הקו&quot;ח שלך..."></textarea>
      </div>
      <button id="btn-tailor-with-text" class="btn btn-tailor">✨ התאם קו"ח למשרה</button>
    </div>

    <!-- Screen: interview questions -->
    <div id="screen-interview" class="screen" style="display:none">
      <button id="btn-back" class="btn btn-secondary btn-sm">← חזור</button>
      <div id="interview-content"></div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
